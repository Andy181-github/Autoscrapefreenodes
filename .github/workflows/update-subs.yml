name: Update Subscription Files

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-subs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run scraper
        run: node scraper.js

      - name: Generate README
        run: node generate-readme.js

      - name: Commit and push
        run: |
          git config --local user.name github-actions[bot]
          git config --local user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add mihomo.yaml all.yaml base64.txt byxiaoxi.txt kooker.jp.txt README.md
          if ! git diff --cached --quiet; then
            git commit -m chore-sync-subscriptions
          fi
          git diff --quiet && git diff --staged --quiet || (git commit -m chore-sync-skip-ci && git push)
