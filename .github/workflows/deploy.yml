name: 自动更新免费节点订阅

on:
  # 自动执行的时间，北京时间每5小时运行
  schedule:
    - cron: '0 16 */5 * *'
  
  # 当push到main分支时也执行
  push:
    branches: [ main ]
  
  # 允许手动触发工作流
  workflow_dispatch:

# 设置权限
permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      # 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
        
      # 设置Node.js环境
      - name: 设置Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      # 安装依赖
      - name: 安装依赖
        run: npm install
        
      # 执行节点抓取
      - name: 运行爬虫
        run: node scraper.js
        
      # 提交更新的文件到主分支
      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add all.yaml base64.txt byxiaoxi.txt kooker.jp.txt mihomo.yaml README.md config.json
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新: 更新节点数据 [skip ci]"
          git push --set-upstream origin main || (git pull --rebase origin main && git push)
